{{- $agentConfig := deepCopy (.Values.appConfig.agentadaptor | default dict) -}}
{{- $rawOss := .Values.appConfig.oss | default dict -}}
{{- $agentOss := $rawOss -}}
{{- if hasKey $rawOss "aliyun" -}}
{{- $agentOss = $rawOss.aliyun -}}
{{- end -}}
{{- $_ := set $agentConfig "oss" $agentOss -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agenthub-gateway.fullname" . }}-agentadaptor
  namespace: {{ include "agenthub-gateway.sandboxNamespace" . }}
  labels:
    {{- include "agenthub-gateway.labels" . | nindent 4 }}
    agent: agent
data:
  config.json: |
    {{- toPrettyJson $agentConfig | nindent 4 }}
