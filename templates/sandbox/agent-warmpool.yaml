apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: {{ include "agenthub-gateway.fullname" . }}-agent-warmpool
  namespace: {{ include "agenthub-gateway.sandboxNamespace" . }}
  labels:
    {{- include "agenthub-gateway.labels" . | nindent 4 }}
    agent: agent
spec:
  replicas: 2
  sandboxTemplateRef:
    name: {{ include "agenthub-gateway.fullname" . }}-agent
