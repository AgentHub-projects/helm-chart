{{- $backend := .Values.fullstack.backend }}
{{- $secretEnv := $backend.secretEnv | default dict }}
{{- $rawOss := .Values.appConfig.oss | default dict }}
{{- $oss := $rawOss }}
{{- if hasKey $rawOss "aliyun" }}
{{- $oss = $rawOss.aliyun }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agenthub-gateway.fullstackBackendSecretName" . }}
  labels:
    {{- include "agenthub-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: fullstack-backend
type: Opaque
stringData:
  {{- range $key, $value := $secretEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if not (hasKey $secretEnv "DATABASE_URL") }}
  DATABASE_URL: {{ include "agenthub-gateway.fullstackDatabaseUrl" . | quote }}
  {{- end }}
  {{- if and $backend.redisUrl (not (hasKey $secretEnv "REDIS_URL")) }}
  REDIS_URL: {{ $backend.redisUrl | quote }}
  {{- end }}
  {{- if not (hasKey $secretEnv "ALIYUN_OSS_ACCESS_KEY_ID") }}
  ALIYUN_OSS_ACCESS_KEY_ID: {{ $oss.accessKeyId | default "" | quote }}
  {{- end }}
  {{- if not (hasKey $secretEnv "ALIYUN_OSS_ACCESS_KEY_SECRET") }}
  ALIYUN_OSS_ACCESS_KEY_SECRET: {{ $oss.accessKeySecret | default "" | quote }}
  {{- end }}
