{{- $backend := .Values.fullstack.backend }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agenthub-gateway.fullstackBackendName" . }}
  labels:
    {{- include "agenthub-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: fullstack-backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $backend.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "agenthub-gateway.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: fullstack-backend
