{{- $frontend := .Values.fullstack.frontend }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenthub-gateway.fullstackFrontendName" . }}
  labels:
    {{- include "agenthub-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: fullstack-frontend
spec:
  replicas: {{ $frontend.replicas }}
  selector:
    matchLabels:
      {{- include "agenthub-gateway.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: fullstack-frontend
  template:
    metadata:
      labels:
        {{- include "agenthub-gateway.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: fullstack-frontend
    spec:
      {{- if .Values.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.pullSecret | quote }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "agenthub-gateway.fullstackFrontendImage" . | quote }}
          imagePullPolicy: {{ $frontend.pullPolicy | quote }}
          ports:
            - name: http
              containerPort: {{ $frontend.port }}
              protocol: TCP
          {{- with $frontend.env }}
          env:
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $frontend.resources | nindent 12 }}
