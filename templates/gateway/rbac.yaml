apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agenthub-gateway.fullname" . }}
  namespace: {{ include "agenthub-gateway.sandboxNamespace" . }}
  labels:
    {{- include "agenthub-gateway.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - agents.x-k8s.io
    resources:
      - sandboxes
    verbs:
      - get
  - apiGroups:
      - extensions.agents.x-k8s.io
    resources:
      - sandboxtemplates
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions.agents.x-k8s.io
    resources:
      - sandboxclaims
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - extensions.agents.x-k8s.io
    resources:
      - sandboxclaims/status
    verbs:
      - get
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agenthub-gateway.fullname" . }}
  namespace: {{ include "agenthub-gateway.sandboxNamespace" . }}
  labels:
    {{- include "agenthub-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agenthub-gateway.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agenthub-gateway.fullname" . }}
    namespace: {{ .Release.Namespace }}
