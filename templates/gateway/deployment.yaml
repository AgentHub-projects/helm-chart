apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenthub-gateway.fullname" . }}
  labels:
    {{- include "agenthub-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "agenthub-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "agenthub-gateway.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: {{ include "agenthub-gateway.fullname" . }}
      automountServiceAccountToken: true
      {{- if .Values.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.pullSecret }}
      {{- end }}
      containers:
        - name: agenthub-gateway
          image: {{ include "agenthub-gateway.image" . | quote }}
          imagePullPolicy: {{ .Values.appConfig.gateway.pullPolicy }}
          args:
            - -config
            - /etc/agenthub-gateway/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.appConfig.gateway.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/agenthub-gateway/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "agenthub-gateway.fullname" . }}
